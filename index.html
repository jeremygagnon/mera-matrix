<style>
:root{
  --bg:#161a23; --panel:#1e2330; --panel-2:#191e29; --inset:#12161f;
  --ink:#f2f3f5; --ink-2:#c4c8d4; --muted:#878ea0; --faint:#565d72;
  --line:#2c3347; --line-2:#232a3a;
  --accent:#ff7a3d; --accent-2:#e8622a; --accent-soft:#3a2316;
  --teal:#3ddc8a; --amber:#f0b73d;
  --font:'Syne',-apple-system,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font); color:var(--ink); background:var(--bg);
  min-height:100%; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1100px 520px at 88% -8%, rgba(255,122,61,.10), transparent 60%),
    radial-gradient(900px 480px at 5% 4%, rgba(91,155,240,.07), transparent 55%);
  background-attachment:fixed;
}
.wrap{max-width:1240px; margin:0 auto; padding:48px 28px 64px;}

/* header */
.top{display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:42px;
  animation:riseUp 2.9s cubic-bezier(.65,0,.2,1) both;}
.logo-tile{
  width:60px; height:60px; border-radius:16px; flex:0 0 auto; padding:12px;
  display:grid; place-items:center;
  background:linear-gradient(158deg,#ffffff,#e7ebf1);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:0 8px 26px rgba(0,0,0,.45), 0 0 32px rgba(61,220,138,.07), inset 0 1px 0 rgba(255,255,255,.9);
  transition:transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s ease;
  animation:logoZoom 1.2s cubic-bezier(.5,.1,.2,1) backwards;
}
.logo-tile svg{width:100%; height:100%; display:block;}
.logo-tile:hover{transform:translateY(-2px) rotate(-4deg) scale(1.03);
  box-shadow:0 16px 38px rgba(0,0,0,.52), 0 0 40px rgba(162,208,116,.12), inset 0 1px 0 rgba(255,255,255,.9);}
.wordmark{font-size:31px; font-weight:800; letter-spacing:-.025em; line-height:1; display:flex; gap:.26em;}
.wordmark .mx{
  background:linear-gradient(94deg,#EDDC61 0%,#A2D074 46%,#3ddc8a 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
}
.brand{overflow:hidden; white-space:nowrap;
  animation:wordReveal .7s cubic-bezier(.5,.1,.2,1) 1.2s backwards;}
/* intro: big logo centered → shrinks → wordmark wipes in L→R → group rises to top */
@keyframes logoZoom{
  0%   { opacity:0; transform:scale(2.3); }
  12%  { opacity:1; transform:scale(2.3); }
  100% { opacity:1; transform:scale(1); }
}
@keyframes wordReveal{
  0%   { max-width:0; opacity:0; }
  12%  { opacity:1; }
  100% { max-width:460px; opacity:1; }
}
@keyframes riseUp{
  0%   { opacity:0; transform:translateY(calc(50vh - 78px)); }
  6%   { opacity:1; }
  66%  { transform:translateY(calc(50vh - 78px)); }
  100% { transform:translateY(0); }
}
@keyframes cardIn{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
@media (prefers-reduced-motion: reduce){
  .top{animation:none;}
  .logo-tile{animation:none;}
  .brand{animation:none;}
  .foot{animation:none;}
  .section + .section::before{animation:none;}
  .card{animation:none !important; opacity:1 !important; transform:none !important;}
}
/* sections — four categories side by side as columns, dividers between */
#sections{position:relative; display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:0; align-items:stretch;}
.section{min-width:0; position:relative; padding:0 22px;}
.section:first-child{padding-left:0;}
.section:last-child{padding-right:0;}
.section + .section::before{content:""; position:absolute; left:0; top:2px; bottom:2px; width:1px; pointer-events:none;
  background:var(--line); animation:fadeIn .6s ease 3s both;}
.section-head{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
.section-head::before{content:""; flex:0 0 auto; width:3px; align-self:stretch; min-height:19px; border-radius:2px;
  background:linear-gradient(180deg, #A2D074, #3ddc8a);
  box-shadow:0 0 12px rgba(61,220,138,.45);}
.section-head h2{font-family:var(--mono); font-size:13px; font-weight:500;
  letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; line-height:1.1;
  min-width:0; overflow:hidden; text-overflow:ellipsis;
  background:linear-gradient(180deg, var(--ink) 25%, var(--muted));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;}
.section-head .rule{flex:1; height:1px; background:linear-gradient(90deg, var(--line), transparent);}
/* grid */
.grid{display:grid; grid-template-columns:1fr; gap:14px;}
.card{
  position:relative; display:flex; flex-direction:column;
  background:rgba(255,255,255,.022);
  border:0; border-radius:18px; padding:18px 22px 15px; min-height:128px;
  text-decoration:none; color:inherit; overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .22s cubic-bezier(.2,.7,.3,1), background .22s ease, box-shadow .22s ease;
}
/* soft accent wash in the corner instead of a hard top bar */
.card::before{content:""; position:absolute; top:-45%; right:-25%; width:65%; height:90%; pointer-events:none;
  background:radial-gradient(closest-side, var(--c,var(--accent)), transparent 72%); opacity:.10;
  transition:opacity .22s ease;}
.card.live{cursor:pointer;}
.card.live:hover{transform:translateY(-4px); background:rgba(255,255,255,.05);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 22px 48px rgba(0,0,0,.44);}
.card.live:hover::before{opacity:.22;}
.card.todo{opacity:.55;}
.card.soon{opacity:.82;}
.card.empty{display:flex; align-items:center; justify-content:center; min-height:128px;
  border:1px dashed var(--line-2); background:transparent; box-shadow:none;}
.card.empty::before{display:none;}
.card.empty .emptytx{font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint);}
/* under-construction caution tape — clipped to the card by .card overflow:hidden */
.tape{
  position:absolute; top:50%; left:-30%; width:160%; height:34px; z-index:6;
  transform:translateY(-50%) rotate(-17deg); pointer-events:none;
  display:flex; align-items:center; justify-content:center; gap:30px;
  background:#f4c20d; border-top:3px solid #141414; border-bottom:3px solid #141414;
  box-shadow:0 8px 22px rgba(0,0,0,.45); overflow:hidden;
}
.tape::before{content:""; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(135deg, rgba(0,0,0,.18) 0 11px, transparent 11px 22px);}
.tape span{
  position:relative; font-family:var(--mono); font-weight:700; font-size:12px;
  letter-spacing:.18em; text-transform:uppercase; color:#141414; white-space:nowrap;
}
.chead{display:flex; align-items:flex-start; gap:13px; margin-bottom:10px;}
.chead > div:last-child{padding-top:11px;}
.ic{
  width:42px; height:42px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center;
  background:color-mix(in srgb, var(--c,var(--accent)) 17%, transparent);
}
.ic svg{width:22px; height:22px; stroke:var(--c,var(--accent)); fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}
.tag{font-family:var(--mono); font-size:9.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); margin-bottom:3px;}
.cname{font-size:16px; font-weight:600; letter-spacing:-.01em; line-height:1.2; height:2.4em;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;} /* fixed 2-line name box, sized so every dashboard name fits 2 lines → all cards identical height */
.cfoot{display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:14px;}
.open{font-family:var(--mono); font-size:12px; letter-spacing:.06em; color:var(--c,var(--accent)); display:flex; align-items:center; gap:7px;}
.open .arr{transition:transform .22s ease;}
.card.live:hover .open .arr{transform:translateX(4px);}
.pill{font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:999px;}
.pill.on{color:var(--teal); background:rgba(61,220,138,.12);}
.pill.off{color:var(--faint); background:rgba(255,255,255,.04);}
.pill.soon{color:var(--c,var(--accent)); background:color-mix(in srgb, var(--c,var(--accent)) 15%, transparent);}

.foot{margin-top:36px; padding-top:18px; border-top:1px solid var(--line-2);
  font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.04em;
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  animation:fadeIn .6s ease 3.2s both;}
@media(max-width:1080px){ #sections{grid-template-columns:repeat(2,minmax(0,1fr)); column-gap:28px; row-gap:34px;}
  .section{padding:0;} .section:first-child,.section:last-child{padding:0;} .section + .section::before{display:none;} }
@media(max-width:620px){ #sections{grid-template-columns:1fr;} .wrap{padding:32px 18px 48px;} }

/* top-right status: Eastern clock + IP-based weather */
.statusbar{
  position:fixed; top:20px; right:26px; z-index:60;
  display:flex; flex-direction:column; align-items:flex-end; text-align:right;
  font-family:var(--mono); pointer-events:none;
  animation:fadeIn .6s ease 3s both;
}
.sb-clock{display:flex; align-items:baseline; gap:6px; justify-content:flex-end;
  font-size:15px; font-weight:500; color:var(--ink); letter-spacing:.03em;
  font-variant-numeric:tabular-nums;}
.sb-clock .ampm{font-size:9.5px; color:var(--muted); letter-spacing:.12em;}
.sb-date{font-size:9.5px; color:var(--faint); letter-spacing:.14em; margin-top:3px;}
.sb-wx{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-2);
  margin-top:8px; padding-top:8px; border-top:1px solid var(--line-2);}
.sb-wx:empty{display:none;}
.sb-wx svg{width:15px; height:15px; stroke:var(--amber); fill:none;
  stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;}
.sb-wx .temp{font-weight:500; color:var(--ink); font-variant-numeric:tabular-nums;}
.sb-wx .desc{color:var(--ink-2);}
.sb-wx .loc{color:var(--faint);}
@media(max-width:680px){ .statusbar{display:none;} }
</style>
</head>

        <path d="M59.35 29.67 74.18 44.51 74.18 14.84Z" fill="#EDDC61"/>
        <path d="M59.35 59.35 44.51 44.51 44.51 74.18Z" fill="#004C6C"/>
        <path d="M29.67 59.35 44.51 74.18 44.51 44.51Z" fill="#A2D074"/>
      </svg>
    </div>
    <div class="brand">
      <h1 class="wordmark"><span>Mera</span><span class="mx">Matrix</span></h1>
    </div>
  </div>
  <div id="sections"></div>

  <div class="foot">
    <span id="cnt"></span>
    <span>Mera Cannabis · internal use · Built by: Jeremy Gagnon</span>
  </div>
</div>

<script>
/* ============================================================================
   EDIT HERE — once your repos are on GitHub Pages.
   Set GH_USER to your GitHub username (or org). Repo names below are guesses —
   change `repo` to match, OR paste a full link into `url` to override entirely.
   A card goes "live" as soon as its link no longer contains a placeholder.
   ========================================================================== */
const GH_USER = 'jeremygagnon';

const DASHBOARDS = [
  {
    name:'S&OP',
    section:'Supply Chain',
    tag:'Sales & Ops Planning',
    desc:'Forecast vs actual by category — demand plan, attainment and the market Crystal Ball.',
    repo:'S-OP',
    url:'',                       // e.g. 'https://USER.github.io/sop-dashboard/'
    accent:'#ff7a3d', icon:'chart'
  },
  {
    name:'PO Tracker',
    section:'Sales Ops',
    tag:'Purchasing',
    desc:'Purchase orders end to end — allocate by SKU, track status and PO financials.',
    repo:'POTracker',
    url:'https://jeremygagnon.github.io/POTracker/POTracker.html',
    accent:'#5b9bf0', icon:'doc'
  },
  {
    name:'Flower Procurement',
    section:'Supply Chain',
    tag:'Procurement',
    desc:'Dried-flower buying — suppliers, contracted buy prices, volumes and spend.',
    repo:'flower-procurement',
    url:'https://jeremygagnon.github.io/flower-procurement/FProcurement.html',
    accent:'#e879b9', icon:'flower'
  },
  {
    name:'Procurement',
    section:'Supply Chain',
    tag:'Packaging',
    desc:'Harwill packaging-materials procurement and inventory overview.',
    repo:'procurement-dashboard',
    url:'',
    accent:'#97cf3f', icon:'box', wip:true, soon:true
  },
  {
    name:'Product Development',
    section:'Sales & Marketing',
    tag:'Product Development',
    desc:'New-product pipeline — concepts, formulation and launch readiness.',
    repo:'',
    url:'https://kylenauj.github.io/productdev/',
    accent:'#33c5d6', icon:'flask'
  },
];

/* sections render left-to-right as columns in this order */
const SECTIONS = ['Supply Chain', 'Sales Ops', 'Sales & Marketing', 'Inventory & Logistics'];

/* --- icons --- */
const ICONS = {
  flower:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 9c0-3 1.2-5 0-6.5C10.8 4 12 6 12 9zM12 15c0 3-1.2 5 0 6.5 1.2-1.5 0-3.5 0-6.5zM9 12c-3 0-5-1.2-6.5 0C4 13.2 6 12 9 12zM15 12c3 0 5 1.2 6.5 0C20 10.8 18 12 15 12zM9.9 9.9C7.8 7.8 6 6.6 5.6 4.6 7.6 5 8.8 6.8 10.9 8.9zM14.1 14.1c2.1 2.1 3.9 3.3 4.3 5.3-2-.4-3.2-2.2-5.3-4.3z"/></svg>',
  doc:'<svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6M9 9h1"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg>',
  flask:'<svg viewBox="0 0 24 24"><path d="M9 3h6"/><path d="M10 3v6.5L4.8 18A2 2 0 0 0 6.6 21h10.8a2 2 0 0 0 1.8-3L14 9.5V3"/><path d="M7.5 14.5h9"/></svg>',
};

const PLACEHOLDER = 'YOUR-GITHUB-USERNAME';
function resolve(d){
  if(d.url && d.url.trim()) return d.url.trim();
  if(GH_USER && GH_USER !== PLACEHOLDER && d.repo) return `https://${GH_USER}.github.io/${d.repo}/`;
  return '';
}

const root = document.getElementById('sections');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let liveCount = 0;
const reveal = [];   // section heads + cards, in DOM order, for the staggered intro

SECTIONS.forEach(sectionName=>{
  const items = DASHBOARDS.filter(d=>d.section===sectionName);

  const sec = document.createElement('div');
  sec.className = 'section';
  const head = document.createElement('div');
  head.className = 'section-head';
  head.innerHTML = `<h2>${sectionName}</h2><span class="rule"></span>`;
  if(!reduceMotion) head.style.opacity = '0';
  sec.appendChild(head);
  reveal.push(head);

  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(d=>{
    const soon = !!d.soon;
    const href = resolve(d);
    const live = !!href && !soon;
    if(live) liveCount++;
    const el = document.createElement(live ? 'a' : 'div');
    el.className = 'card ' + (live ? 'live' : soon ? 'soon' : 'todo') + (d.wip ? ' wip' : '');
    el.style.setProperty('--c', d.accent || 'var(--accent)');
    if(live){ el.href = href; el.target = '_blank'; el.rel = 'noopener'; }
    if(!reduceMotion) el.style.opacity = '0';
    el.innerHTML = `
      ${d.wip ? '<div class="tape" aria-hidden="true"><span>Under Construction</span><span>Under Construction</span><span>Under Construction</span></div>' : ''}
      <div class="chead">
        <div class="ic">${ICONS[d.icon]||ICONS.chart}</div>
        <div><div class="cname">${d.name}</div></div>
      </div>
      <div class="cfoot">
        <span class="open">${live ? 'Open app' : soon ? 'Coming soon' : 'Link not set'} <span class="arr">${live?'→':'·'}</span></span>
        <span class="pill ${live?'on':soon?'soon':'off'}">${live?'Live':soon?'Coming Soon':'Set up'}</span>
      </div>`;
    grid.appendChild(el);
    reveal.push(el);
  });
  if(!items.length){
    const ph = document.createElement('div');
    ph.className = 'card empty';
    ph.innerHTML = '<span class="emptytx">No apps yet</span>';
    if(!reduceMotion) ph.style.opacity = '0';
    grid.appendChild(ph);
    reveal.push(ph);
  }
  sec.appendChild(grid);
  root.appendChild(sec);
});

/* after the logo settles at the top, reveal the section heads + cards one by one */
if(!reduceMotion){
  const START = 2900, STEP = 130;
  reveal.forEach((el, i)=>{
    setTimeout(()=>{
      el.style.animation = 'cardIn .55s cubic-bezier(.2,.7,.3,1) both';
      el.addEventListener('animationend', ()=>{
        el.style.animation = '';
        el.style.opacity = '';
        el.style.transform = '';
      }, { once:true });
    }, START + i*STEP);
  });
}

document.getElementById('cnt').textContent =
  `${liveCount}/${DASHBOARDS.length} app${DASHBOARDS.length===1?'':'s'} linked`;

/* ---- top-right status: Eastern-time clock + IP-based weather ---- */
(function(){
  const elClock = document.getElementById('sbClock');
  const elDate  = document.getElementById('sbDate');
  const elWx    = document.getElementById('sbWx');
  if(!elClock) return;

  const tFmt  = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
  const tzFmt = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',timeZoneName:'short'});
  const dFmt  = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',weekday:'short',month:'short',day:'numeric',year:'numeric'});

  function tick(){
    const now = new Date();
    const p = tFmt.formatToParts(now);
    const get = t => (p.find(x=>x.type===t)||{}).value || '';
    const tz = (tzFmt.formatToParts(now).find(x=>x.type==='timeZoneName')||{}).value || 'ET';
    elClock.innerHTML = `${get('hour')}:${get('minute')}:${get('second')}<span class="ampm">${get('dayPeriod')} ${tz}</span>`;
    elDate.textContent = dFmt.format(now).toUpperCase();
  }
  tick(); setInterval(tick, 1000);

  const WX = {
    sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    partly:'<svg viewBox="0 0 24 24"><path d="M8 4.5V3M4.6 6.1 3.5 5M5 10H3.5M11.4 6.1l1.1-1.1"/><circle cx="8" cy="10" r="2.3"/><path d="M16.5 19a3.5 3.5 0 0 0 .4-6.97 4.7 4.7 0 0 0-9.03-1A3.2 3.2 0 0 0 7.6 19z"/></svg>',
    cloud:'<svg viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 0 0 .5-8.97 6 6 0 0 0-11.64-1.6A4 4 0 0 0 6.5 19z"/></svg>',
    rain:'<svg viewBox="0 0 24 24"><path d="M17.5 15a4.5 4.5 0 0 0 .5-8.97 6 6 0 0 0-11.64-1.6A4 4 0 0 0 6.5 15z"/><path d="M8 19l-1 2M12 19l-1 2M16 19l-1 2"/></svg>',
    snow:'<svg viewBox="0 0 24 24"><path d="M17.5 14a4.5 4.5 0 0 0 .5-8.97 6 6 0 0 0-11.64-1.6A4 4 0 0 0 6.5 14z"/><path d="M8 18h.01M12 19h.01M16 18h.01M10 21h.01M14 21h.01"/></svg>',
    fog:'<svg viewBox="0 0 24 24"><path d="M7 5h10M4 9h16M4 13h16M6 17h12"/></svg>',
    storm:'<svg viewBox="0 0 24 24"><path d="M17.5 14a4.5 4.5 0 0 0 .5-8.97 6 6 0 0 0-11.64-1.6A4 4 0 0 0 6.5 14z"/><path d="M12 13l-2 4h3l-2 4"/></svg>'
  };
  function codeMap(c){
    if(c===0) return ['Clear','sun'];
    if(c===1) return ['Mostly clear','sun'];
    if(c===2) return ['Partly cloudy','partly'];
    if(c===3) return ['Overcast','cloud'];
    if(c===45||c===48) return ['Fog','fog'];
    if(c>=51&&c<=57) return ['Drizzle','rain'];
    if(c>=61&&c<=67) return ['Rain','rain'];
    if(c>=71&&c<=77) return ['Snow','snow'];
    if(c>=80&&c<=82) return ['Showers','rain'];
    if(c>=85&&c<=86) return ['Snow showers','snow'];
    if(c>=95) return ['Thunderstorm','storm'];
    return ['—','cloud'];
  }
  async function getGeo(){
    try{ const g = await fetch('https://ipapi.co/json/').then(r=>r.json());
      if(g && g.latitude!=null) return {lat:g.latitude, lon:g.longitude, city:g.city||g.region}; }catch(e){}
    try{ const g = await fetch('https://ipwho.is/').then(r=>r.json());
      if(g && g.success!==false && g.latitude!=null) return {lat:g.latitude, lon:g.longitude, city:g.city||g.region}; }catch(e){}
    return null;
  }
  async function loadWx(){
    try{
      const g = await getGeo(); if(!g) throw 0;
      const u = `https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,weather_code`;
      const w = await fetch(u).then(r=>r.json());
      const cur = w && w.current; if(!cur) throw 0;
      const [label, ic] = codeMap(cur.weather_code);
      const temp = Math.round(cur.temperature_2m);
      const loc = g.city ? ` <span class="loc">· ${g.city}</span>` : '';
      elWx.innerHTML = `${WX[ic]||WX.cloud}<span class="temp">${temp}°C</span><span class="desc">${label}</span>${loc}`;
    }catch(e){ elWx.innerHTML=''; }
  }
  loadWx();
  setInterval(loadWx, 15*60*1000);
})();
</script>
</body>
</html>
